<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fyzika | Úvod</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">FYZIKA LAB</a>
      <nav class="nav-links">
        <a class="active" href="index.html">Úvod</a>
        <a href="teorie.html">Teorie</a>
        <a href="praxe.html">Praxe</a>
        <a href="zajimavosti.html">Zajímavosti</a>
        <a href="zdroje.html">Zdroje</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="choice-hero" aria-label="Výběr tématu">
      <button class="choice-panel" type="button" data-mode="rentgen"
              style="--bgimg:url('assets/img/rentgen.png')">
        <div class="choice-overlay"></div>
        <div class="choice-content">
          <div class="kicker">Neviditelné spektrum</div>
          <h1 class="choice-title">Rentgen</h1>
          <p class="choice-sub">Pohled do lidského těla • CT sken</p>
          <span class="choice-cta">Pokračovat</span>
        </div>
      </button>

      <button class="choice-panel" type="button" data-mode="zrcadla"
              style="--bgimg:url('assets/img/zrcadlo.png')">
        <div class="choice-overlay"></div>
        <div class="choice-content">
          <div class="kicker">Světlo a optika</div>
          <h1 class="choice-title">Zrcadla</h1>
          <p class="choice-sub">Odraz • Periskop • Klamná zrcadla</p>
          <span class="choice-cta">Pokračovat</span>
        </div>
      </button>

      <div class="choice-footer">Vyber téma. Ostatní stránky se přepnou podle volby.</div>
    </section>
  </main>

  <script>
    // Ulož výběr a přesměruj na Teorii
    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        localStorage.setItem("mode", btn.getAttribute("data-mode"));
        window.location.href = "teorie.html";
      });
    });
  </script>
</body>
</html>
